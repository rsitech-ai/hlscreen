<text x="24" y="208" fill="#d8dee9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">clean_shutdown=true</text>
<text x="24" y="228" fill="#d8dee9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400"></text>
<text x="24" y="248" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700">$ ./target/debug/hls replay --data-dir &#x27;&lt;tmp&gt;&#x27; --run-id screenshot</text>
<text x="24" y="268" fill="#53616f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">╭────────────────────────────────────────────────────────────────────────────────────────────────────────╮</text>
<text x="24" y="288" fill="#79c0ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700">│ HLSCREEN   READ-ONLY Hyperliquid spot replay                                            READ-ONLY │</text>
<text x="24" y="308" fill="#53616f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">├────────────────────────────────────────────────────────────────────────────────────────────────────────┤</text>
<text x="24" y="328" fill="#d8dee9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">│ DATA       public spot market data only | rows 1 | fresh 1 | stale 0 | incomplete 0              LOCAL │</text>
<text x="24" y="348" fill="#53616f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">╰────────────────────────────────────────────────────────────────────────────────────────────────────────╯</text>
<text x="24" y="368" fill="#d8dee9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">SYMBOL        STATE         PRICE         SPREAD     TOB DEPTH       IMBAL     RET 1M    SCORE      AGE</text>
<text x="24" y="388" fill="#53616f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">────────────  ────────────  ────────────  ─────────  ────────────  ─────────  ─────────  ───────  ───────</text>
<text x="24" y="408" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="600">@107          ● fresh            35.2000   57.1 bps          $245       -15%     +0.57%     2.45      0ms</text>
<text x="24" y="428" fill="#d8dee9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400"></text>
<text x="24" y="448" fill="#a7b3c2" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">Read-only screen: public spot market data only. Scores are heuristics, not trading signals.</text>
