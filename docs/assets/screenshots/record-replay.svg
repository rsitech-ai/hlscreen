<text x="24" y="428" fill="#ffa657" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700">#   SYMBOL        STATE          PRICE       SPREAD   TOB DEPTH    IMBAL    RET 1M     RV 1M    LIQ    MOM     AGE</text>
<text x="24" y="448" fill="#53616f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">──  ────────────  ─────────────  ───────────  ─────────  ──────────  ───────  ────────  ────────  ─────  ─────  ──────</text>
<text x="24" y="468" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="600">01  @107          ● FRESH            35.2000   57.1 bps        $245     -15%    +0.57%     0.00%    2.5   50.6     0ms</text>
<text x="24" y="488" fill="#d8dee9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400"></text>
<text x="24" y="508" fill="#a7b3c2" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">No wallet, no private streams, no order routes. Scores are screen heuristics, not orders or advice.</text>
