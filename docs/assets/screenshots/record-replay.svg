<text x="24" y="88" fill="#d8dee9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">  --run-id screenshot --data-dir &#x27;&lt;tmp&gt;&#x27;</text>
