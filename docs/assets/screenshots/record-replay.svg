<text x="24" y="268" fill="#53616f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="400">╭────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────╮</text>
<text x="24" y="288" fill="#79c0ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700">│ HLSCREEN   Hyperliquid Microstructure Workstation                                                            READ-ONLY │</text>
