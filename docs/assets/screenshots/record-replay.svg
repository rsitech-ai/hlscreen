<text x="24" y="328" fill="#ffa657" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700">│ MODE       READ-ONLY Hyperliquid spot replay | PUBLIC WS/REST | local replay ready                           SAFE │</text>
