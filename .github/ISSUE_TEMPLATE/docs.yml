name: Documentation issue
description: Report unclear, stale, or missing documentation.
title: "[docs]: "
labels:
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: README.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or wrong?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested fix
