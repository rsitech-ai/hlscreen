name: Release Packaging

on:
  pull_request:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - dist-workspace.toml
      - crates/**
      - .github/workflows/release.yml
      - docs/RELEASING.md
      - scripts/check-release-packaging.sh
      - tests/integration/release_packaging.rs
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  plan:
    name: cargo-dist plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install 1.88 --profile minimal

      - name: Install cargo-dist
        run: cargo install cargo-dist --version 0.32.0 --locked

      - name: Validate release packaging files
        run: scripts/check-release-packaging.sh

      - name: Preview release plan
        run: dist plan

  package:
    name: cargo-dist package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install 1.88 --profile minimal

      - name: Install cargo-dist
        run: cargo install cargo-dist --version 0.32.0 --locked

      - name: Build distributable artifacts
        run: dist build
