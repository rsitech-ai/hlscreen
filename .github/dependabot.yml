version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    ignore:
      # Keep the Rust 1.88 MSRV green until a dedicated SQLite upgrade slice
      # proves newer rusqlite/libsqlite3-sys versions against CI.
      - dependency-name: rusqlite
        update-types:
          - version-update:semver-minor
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    ignore:
      # .github/workflows/release.yml is generated by pinned cargo-dist 0.32.0,
      # whose plan check currently expects actions/checkout@v6.
      - dependency-name: actions/checkout
        update-types:
          - version-update:semver-major
    cooldown:
      default-days: 7
